<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - STATAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Barlow:wght@400;500&family=Bebas+Neue&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-container">
    <a href="statac.html" class="static-logo">STATAC<span class="logo-dot"></span></a>
    
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Log in to unlock premium cricket analytics</p>

    <div class="error-msg" id="error-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="auth-btn" id="submit-btn">Continue</button>
    </form>

    <div class="auth-footer">
      New to STATAC? <a href="register.html">Create an account</a>
    </div>
  </div>

  <!-- Unified Auth Logic -->
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
