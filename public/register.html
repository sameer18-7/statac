<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join STATAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Barlow:wght@400;500&family=Bebas+Neue&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-container">
    <a href="statac.html" class="static-logo">STATAC<span class="logo-dot"></span></a>
    
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Get your lifetime PRO access</p>

    <div class="error-msg" id="error-box"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="cricket_fan_24" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Create a strong password" required minlength="6">
      </div>

      <button type="submit" class="auth-btn" id="submit-btn">Join STATAC</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
